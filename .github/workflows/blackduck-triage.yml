name: Black Duck Vulnerability Triage

on:
  schedule:
    - cron: "30 2 * * 1" # Every Monday 08:00 AM IST (02:30 UTC)
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Run triage script
        env:
          BLACK_DUCK_URL: ${{ secrets.BLACK_DUCK_URL }}
          BLACK_DUCK_API_TOKEN: ${{ secrets.BLACK_DUCK_API_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          PROJECT_PREFIX: "sumtotal-React"
          REPO_ROOT: ${{ github.workspace }}
        run: python scripts/blackduck_triage.py

      - name: Classify vulnerabilities via LLM
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python scripts/classify_vulnerabilities.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: triage-results
          path: |
            LLM_Prompts.txt
            vulnerability_summary.json
            classification_results.json
          retention-days: 30
